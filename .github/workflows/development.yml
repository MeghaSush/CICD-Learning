name: Salesforce CI Pipeline

on:
  push:
    branches:
      - develop

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ------------------------------------------
      # Checkout Code
      # ------------------------------------------
      - name: Checkout Code
        uses: actions/checkout@v4

      # ------------------------------------------
      # Install Salesforce CLI
      # ------------------------------------------
      - name: Install SF CLI
        run: npm install -g @salesforce/cli

      # ------------------------------------------
      # Authenticate to Development Org
      # ------------------------------------------
      - name: Authenticate to Development Org
        run: |
          echo "${{ secrets.JWT_SECRET_KEY }}" > server.key
          sf org login jwt \
            --username ${{ secrets.DEV_USERNAME }} \
            --jwt-key-file server.key \
            --client-id ${{ secrets.CONSUMER_KEY }} \
            --instance-url ${{ vars.INSTANCE_URL }} \
            --alias megh-org

      # ------------------------------------------
      # Retrieve Metadata
      # ------------------------------------------
      - name: Retrieve Metadata
        run: |
          sf project retrieve start -x manifest/package.xml --target-metadata-dir mdapi_out --target-org megh-org --json

      # ------------------------------------------
      # Detect Changed Files
      # ------------------------------------------
      - name: Detect Changed Files
        id: diffcheck
        run: |
          git fetch origin develop || true
          git diff --name-only origin/develop HEAD > changed_files.txt
          echo "Changed files:"
          cat changed_files.txt

      # ------------------------------------------
      # Build Delta Package
      # ------------------------------------------
      - name: Build Delta Package
        run: |
          mkdir -p delta_mdapi

          while read file; do
            if [ -f "mdapi_out/$file" ]; then
              mkdir -p "delta_mdapi/$(dirname $file)"
              cp "mdapi_out/$file" "delta_mdapi/$file"
            fi
          done < changed_files.txt

          echo "Delta package created"
          ls -R delta_mdapi

      # ------------------------------------------
      # Copy package.xml
      # ------------------------------------------
      - name: Copy package.xml
        run: |
          cp mdapi_out/package.xml delta_mdapi/ || true

      # ------------------------------------------
      # Check if Delta is Empty
      # ------------------------------------------
      - name: Check if Delta is Empty
        id: checkdelta
        run: |
          if [ -z "$(ls -A delta_mdapi)" ]; then
            echo "no_changes=true" >> $GITHUB_OUTPUT
          else
            echo "no_changes=false" >> $GITHUB_OUTPUT
          fi

      # ------------------------------------------
      # Validation Rule Check
      # ------------------------------------------
      - name: Check Validation Rule Changes
        id: vrulecheck
        run: |
          if grep -i "validationRules" changed_files.txt; then
            echo "has_validationrule_changes=true" >> $GITHUB_OUTPUT
          else
            echo "has_validationrule_changes=false" >> $GITHUB_OUTPUT
          fi

      # ------------------------------------------
      # Other Metadata Checks
      # ------------------------------------------
      - name: Check Apex Classes
        id: classcheck
        run: |
          if grep -i "classes" changed_files.txt; then
            echo "has_class_changes=true" >> $GITHUB_OUTPUT
          else
            echo "has_class_changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Check Apex Triggers
        id: triggercheck
        run: |
          if grep -i "triggers" changed_files.txt; then
            echo "has_trigger_changes=true" >> $GITHUB_OUTPUT
          else
            echo "has_trigger_changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Check LWC
        id: lwccheck
        run: |
          if grep -i "lwc" changed_files.txt; then
            echo "has_lwc_changes=true" >> $GITHUB_OUTPUT
          else
            echo "has_lwc_changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Check Aura
        id: auracheck
        run: |
          if grep -i "aura" changed_files.txt; then
            echo "has_aura_changes=true" >> $GITHUB_OUTPUT
          else
            echo "has_aura_changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Check VF Pages
        id: vfcheck
        run: |
          if grep -i "pages" changed_files.txt; then
            echo "has_vf_changes=true" >> $GITHUB_OUTPUT
          else
            echo "has_vf_changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Check VF Components
        id: vfc_check
        run: |
          if grep -i "components" changed_files.txt; then
            echo "has_vfc_changes=true" >> $GITHUB_OUTPUT
          else
            echo "has_vfc_changes=false" >> $GITHUB_OUTPUT
          fi

      # ------------------------------------------
      # Decide Test Strategy
      # ------------------------------------------
      - name: Validation Rule → Run All Local Tests
        id: vrulesuite
        if: ${{ steps.vrulecheck.outputs.has_validationrule_changes == 'true' }}
        run: |
          echo "test-level=RunLocalTests" >> $GITHUB_OUTPUT

      - name: Apex/UI Changes → Smart Test Execution
        id: testsuite
        if: ${{ steps.vrulecheck.outputs.has_validationrule_changes == 'false' && (
                steps.classcheck.outputs.has_class_changes == 'true' ||
                steps.triggercheck.outputs.has_trigger_changes == 'true' ||
                steps.lwccheck.outputs.has_lwc_changes == 'true' ||
                steps.auracheck.outputs.has_aura_changes == 'true' ||
                steps.vfcheck.outputs.has_vf_changes == 'true' ||
                steps.vfc_check.outputs.has_vfc_changes == 'true'
            ) }}
        run: |
          TEST_CLASSES=$(grep -i "test" changed_files.txt | grep -i "classes" | sed 's#.*/##' | sed 's/.cls//g' | paste -sd ',')

          if [ -n "$TEST_CLASSES" ]; then
            echo "tests=$TEST_CLASSES" >> $GITHUB_OUTPUT
            echo "test-level=RunSpecifiedTests" >> $GITHUB_OUTPUT
          else
            echo "test-level=RunLocalTests" >> $GITHUB_OUTPUT
          fi

      - name: Only Metadata Changes → No Tests
        id: metadatasuite
        if: ${{ steps.vrulecheck.outputs.has_validationrule_changes == 'false' &&
                steps.classcheck.outputs.has_class_changes == 'false' &&
                steps.triggercheck.outputs.has_trigger_changes == 'false' &&
                steps.lwccheck.outputs.has_lwc_changes == 'false' &&
                steps.auracheck.outputs.has_aura_changes == 'false' &&
                steps.vfcheck.outputs.has_vf_changes == 'false' &&
                steps.vfc_check.outputs.has_vfc_changes == 'false' }}
        run: |
          echo "test-level=NoTestRun" >> $GITHUB_OUTPUT

      # ------------------------------------------
      # Authenticate to Deployment Org
      # ------------------------------------------
      - name: Authenticate to Deployment Org
        run: |
          echo "${{ secrets.JWT_SECRET_KEY }}" > server.key
          sf org login jwt \
            --username ${{ secrets.DEPLOYMENT_USERNAME }} \
            --jwt-key-file server.key \
            --client-id ${{ secrets.CONSUMER_KEYS }} \
            --instance-url ${{ vars.INSTANCE_URL }} \
            --alias deploy-org

      # ------------------------------------------
      # Deploy Delta Package
      # ------------------------------------------
      - name: Deploy Delta Package
        if: ${{ steps.checkdelta.outputs.no_changes == 'false' }}
        run: |
          if [[ "${{ steps.testsuite.outputs.test-level }}" == "RunSpecifiedTests" ]]; then
            sf project deploy start \
              --metadata-dir delta_mdapi \
              --target-org deploy-org \
              --test-level RunSpecifiedTests \
              --tests "${{ steps.testsuite.outputs.tests }}" \
              --wait 30

          elif [[ "${{ steps.vrulesuite.outputs.test-level }}" == "RunLocalTests" || "${{ steps.testsuite.outputs.test-level }}" == "RunLocalTests" ]]; then
            sf project deploy start \
              --metadata-dir delta_mdapi \
              --target-org deploy-org \
              --test-level RunLocalTests \
              --wait 30

          else
            sf project deploy start \
              --metadata-dir delta_mdapi \
              --target-org deploy-org \
              --test-level NoTestRun \
              --wait 30
          fi
