name: Salesforce CI/CD Pipeline (Full Metadata Coverage)

on:
  push:
    branches:
      - develop

permissions:
  contents: write
  pull-requests: write
  actions: read

jobs:
  build-and-promote:
    runs-on: ubuntu-latest

    steps:
      # ------------------------------------------
      # Checkout FULL Repo
      # ------------------------------------------
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ------------------------------------------
      # Install Tools
      # ------------------------------------------
      - name: Install Tools
        run: |
          npm install -g @salesforce/cli
          sudo apt-get update
          sudo apt-get install -y gh

      # ------------------------------------------
      # Detect Changed Files
      # ------------------------------------------
      - name: Detect Changed Files
        id: diffcheck
        run: |
          echo "Before: ${{ github.event.before }}"
          echo "After : ${{ github.sha }}"

          # Handle initial push where 'before' is all zeros
          if [ "${{ github.event.before }}" = "0000000000000000000000000000000000000000" ]; then
            echo "Initial push detected, comparing against HEAD~1"
            git diff --name-only HEAD~1 ${{ github.sha }} > changed_files.txt \
              || git diff --name-only ${{ github.sha }} > changed_files.txt
          else
            git diff --name-only ${{ github.event.before }} ${{ github.sha }} > changed_files.txt
          fi

          git diff --name-status ${{ github.event.before }} ${{ github.sha }} > changes_with_status.txt \
            || git diff --name-status HEAD ${{ github.sha }} > changes_with_status.txt

          cat changed_files.txt

      # ------------------------------------------
      # Extract Changed Metadata (All Types)
      # ------------------------------------------
      - name: Extract Changed Metadata
        run: |
          BASE="force-app/main/default"
          set -e  # Exit on error for debugging

          # Pre-create all files to avoid downstream errors
          touch changed_classes.txt changed_triggers.txt changed_lwc.txt \
                changed_aura.txt changed_vf_pages.txt changed_vf_components.txt \
                changed_flexipages.txt changed_static_resources.txt \
                changed_content_assets.txt changed_exp_cloud.txt \
                changed_objects.txt changed_fields.txt \
                changed_validation_rules.txt changed_record_types.txt \
                changed_compact_layouts.txt changed_list_views.txt \
                changed_field_sets.txt changed_web_links.txt \
                changed_business_processes.txt changed_global_value_sets.txt \
                changed_std_value_sets.txt changed_custom_metadata.txt \
                changed_flows.txt changed_workflows.txt \
                changed_approval_processes.txt changed_assignment_rules.txt \
                changed_auto_response_rules.txt changed_escalation_rules.txt \
                changed_matching_rules.txt changed_duplicate_rules.txt \
                changed_profiles.txt changed_permission_sets.txt \
                changed_perm_set_groups.txt changed_roles.txt \
                changed_sharing_rules.txt changed_custom_permissions.txt \
                changed_muting_perm_sets.txt changed_apps.txt \
                changed_tabs.txt changed_layouts.txt \
                changed_quick_actions.txt changed_global_actions.txt \
                changed_path_assistants.txt changed_global_compact_layouts.txt \
                changed_named_credentials.txt changed_remote_sites.txt \
                changed_connected_apps.txt changed_csp_trusted_sites.txt \
                changed_platform_events.txt changed_external_datasources.txt \
                changed_external_services.txt changed_email_templates.txt \
                changed_reports.txt changed_dashboards.txt \
                changed_documents.txt changed_labels.txt \
                changed_notification_types.txt changed_notif_types.txt \
                changed_territories.txt changed_queues.txt \
                changed_groups.txt changed_settings.txt \
                changed_translations.txt changed_object_translations.txt \
                changed_omni_integrations.txt changed_omni_ui_cards.txt \
                changed_omni_data_transforms.txt

          # Check if changed_files.txt exists and has content
          if [ ! -f changed_files.txt ] || [ ! -s changed_files.txt ]; then
            echo "No changes detected"
            exit 0
          fi

          # ── Code ──────────────────────────────────────────────────────────
          grep "$BASE/classes/.*\.cls$" changed_files.txt | sed 's#.*/##;s/\.cls$//' > changed_classes.txt || true
          grep "$BASE/triggers/.*\.trigger$" changed_files.txt | sed 's#.*/##;s/\.trigger$//' > changed_triggers.txt || true

          # ── UI Components ─────────────────────────────────────────────────
          grep "$BASE/lwc/" changed_files.txt | awk -F'/' '{print $(NF-1)}' | sort -u > changed_lwc.txt || true
          grep "$BASE/aura/" changed_files.txt | awk -F'/' '{print $(NF-1)}' | sort -u > changed_aura.txt || true
          grep "$BASE/pages/.*\.page$" changed_files.txt | sed 's#.*/##;s/\.page$//' > changed_vf_pages.txt || true
          grep "$BASE/components/.*\.component$" changed_files.txt | sed 's#.*/##;s/\.component$//' > changed_vf_components.txt || true
          grep "$BASE/flexipages/.*\.flexipage$" changed_files.txt | sed 's#.*/##;s/\.flexipage$//' > changed_flexipages.txt || true
          grep "$BASE/staticresources/" changed_files.txt | awk -F'/' '{print $NF}' > changed_static_resources.txt || true
          grep "$BASE/contentassets/" changed_files.txt | awk -F'/' '{print $NF}' > changed_content_assets.txt || true
          grep "$BASE/digitalExperiences/" changed_files.txt | awk -F'/' '{print $(NF-1)}' | sort -u > changed_exp_cloud.txt || true

          # ── Object Model ──────────────────────────────────────────────────
          grep "$BASE/objects/.*\.object-meta\.xml$" changed_files.txt | sed 's#.*/##;s/\.object-meta\.xml$//' > changed_objects.txt || true
          grep "$BASE/objects/.*/fields/" changed_files.txt | sed 's#.*/##;s/\.field-meta\.xml$//' > changed_fields.txt || true
          grep "$BASE/objects/.*/validationRules/" changed_files.txt | sed 's#.*/##;s/\.validationRule-meta\.xml$//' > changed_validation_rules.txt || true
          grep "$BASE/objects/.*/recordTypes/" changed_files.txt | sed 's#.*/##;s/\.recordType-meta\.xml$//' > changed_record_types.txt || true
          grep "$BASE/objects/.*/compactLayouts/" changed_files.txt | sed 's#.*/##' > changed_compact_layouts.txt || true
          grep "$BASE/objects/.*/listViews/" changed_files.txt | sed 's#.*/##' > changed_list_views.txt || true
          grep "$BASE/objects/.*/fieldSets/" changed_files.txt | sed 's#.*/##' > changed_field_sets.txt || true
          grep "$BASE/objects/.*/webLinks/" changed_files.txt | sed 's#.*/##' > changed_web_links.txt || true
          grep "$BASE/objects/.*/businessProcesses/" changed_files.txt | sed 's#.*/##' > changed_business_processes.txt || true
          grep "$BASE/globalValueSets/" changed_files.txt | sed 's#.*/##;s/\.globalValueSet-meta\.xml$//' > changed_global_value_sets.txt || true
          grep "$BASE/standardValueSets/" changed_files.txt | sed 's#.*/##;s/\.standardValueSet-meta\.xml$//' > changed_std_value_sets.txt || true
          grep "$BASE/customMetadata/" changed_files.txt | sed 's#.*/##;s/\.md$//' > changed_custom_metadata.txt || true

          # ── Automation ────────────────────────────────────────────────────
          grep "$BASE/flows/.*\.flow-meta\.xml$" changed_files.txt | sed 's#.*/##;s/\.flow-meta\.xml$//' > changed_flows.txt || true
          grep "$BASE/workflows/.*\.workflow-meta\.xml$" changed_files.txt | sed 's#.*/##;s/\.workflow-meta\.xml$//' > changed_workflows.txt || true
          grep "$BASE/approvalProcesses/" changed_files.txt | sed 's#.*/##' > changed_approval_processes.txt || true
          grep "$BASE/assignmentRules/" changed_files.txt | sed 's#.*/##' > changed_assignment_rules.txt || true
          grep "$BASE/autoResponseRules/" changed_files.txt | sed 's#.*/##' > changed_auto_response_rules.txt || true
          grep "$BASE/escalationRules/" changed_files.txt | sed 's#.*/##' > changed_escalation_rules.txt || true
          grep "$BASE/matchingRules/" changed_files.txt | sed 's#.*/##' > changed_matching_rules.txt || true
          grep "$BASE/duplicateRules/" changed_files.txt | sed 's#.*/##' > changed_duplicate_rules.txt || true

          # ── Security & Access ─────────────────────────────────────────────
          grep "$BASE/profiles/.*\.profile-meta\.xml$" changed_files.txt | sed 's#.*/##;s/\.profile-meta\.xml$//' > changed_profiles.txt || true
          grep "$BASE/permissionsets/.*\.permissionset-meta\.xml$" changed_files.txt | sed 's#.*/##;s/\.permissionset-meta\.xml$//' > changed_permission_sets.txt || true
          grep "$BASE/permissionsetgroups/" changed_files.txt | sed 's#.*/##' > changed_perm_set_groups.txt || true
          grep "$BASE/roles/.*\.role-meta\.xml$" changed_files.txt | sed 's#.*/##;s/\.role-meta\.xml$//' > changed_roles.txt || true
          grep "$BASE/sharingRules/" changed_files.txt | sed 's#.*/##' > changed_sharing_rules.txt || true
          grep "$BASE/customPermissions/" changed_files.txt | sed 's#.*/##;s/\.customPermission-meta\.xml$//' > changed_custom_permissions.txt || true
          grep "$BASE/mutingpermissionsets/" changed_files.txt | sed 's#.*/##' > changed_muting_perm_sets.txt || true

          # ── App Config ────────────────────────────────────────────────────
          grep "$BASE/applications/.*\.app-meta\.xml$" changed_files.txt | sed 's#.*/##;s/\.app-meta\.xml$//' > changed_apps.txt || true
          grep "$BASE/tabs/.*\.tab-meta\.xml$" changed_files.txt | sed 's#.*/##;s/\.tab-meta\.xml$//' > changed_tabs.txt || true
          grep "$BASE/layouts/.*\.layout-meta\.xml$" changed_files.txt | sed 's#.*/##;s/\.layout-meta\.xml$//' > changed_layouts.txt || true
          grep "$BASE/quickActions/.*\.quickAction-meta\.xml$" changed_files.txt | sed 's#.*/##;s/\.quickAction-meta\.xml$//' > changed_quick_actions.txt || true
          grep "$BASE/globalActions/" changed_files.txt | sed 's#.*/##' > changed_global_actions.txt || true
          grep "$BASE/pathAssistants/" changed_files.txt | sed 's#.*/##' > changed_path_assistants.txt || true
          grep "$BASE/compactLayouts/" changed_files.txt | sed 's#.*/##' > changed_global_compact_layouts.txt || true

          # ── Integration ───────────────────────────────────────────────────
          grep "$BASE/namedCredentials/" changed_files.txt | sed 's#.*/##' > changed_named_credentials.txt || true
          grep "$BASE/remoteSiteSettings/" changed_files.txt | sed 's#.*/##' > changed_remote_sites.txt || true
          grep "$BASE/connectedApps/" changed_files.txt | sed 's#.*/##' > changed_connected_apps.txt || true
          grep "$BASE/cspTrustedSites/" changed_files.txt | sed 's#.*/##' > changed_csp_trusted_sites.txt || true
          grep "$BASE/platformEventChannels/" changed_files.txt | sed 's#.*/##' > changed_platform_events.txt || true
          grep "$BASE/externalDataSources/" changed_files.txt | sed 's#.*/##' > changed_external_datasources.txt || true
          grep "$BASE/externalServices/" changed_files.txt | sed 's#.*/##' > changed_external_services.txt || true

          # ── Content & Communication ───────────────────────────────────────
          grep "$BASE/email/" changed_files.txt | sed 's#.*/##' > changed_email_templates.txt || true
          grep "$BASE/reports/" changed_files.txt | awk -F'/' '{print $(NF-1)"/"$NF}' | sort -u > changed_reports.txt || true
          grep "$BASE/dashboards/" changed_files.txt | awk -F'/' '{print $(NF-1)"/"$NF}' | sort -u > changed_dashboards.txt || true
          grep "$BASE/documents/" changed_files.txt | sed 's#.*/##' > changed_documents.txt || true
          grep "$BASE/labels/.*\.labels-meta\.xml$" changed_files.txt | sed 's#.*/##' > changed_labels.txt || true
          grep "$BASE/notificationtypes/" changed_files.txt | sed 's#.*/##' > changed_notification_types.txt || true
          grep "$BASE/notifTypes/" changed_files.txt | sed 's#.*/##' > changed_notif_types.txt || true

          # ── Territory & Queue ─────────────────────────────────────────────
          grep "$BASE/territories/" changed_files.txt | sed 's#.*/##' > changed_territories.txt || true
          grep "$BASE/queues/" changed_files.txt | sed 's#.*/##' > changed_queues.txt || true
          grep "$BASE/groups/" changed_files.txt | sed 's#.*/##' > changed_groups.txt || true

          # ── Settings & Org-wide ───────────────────────────────────────────
          grep "$BASE/settings/.*\.settings-meta\.xml$" changed_files.txt | sed 's#.*/##' > changed_settings.txt || true
          grep "$BASE/translations/" changed_files.txt | sed 's#.*/##' > changed_translations.txt || true
          grep "$BASE/objectTranslations/" changed_files.txt | sed 's#.*/##' > changed_object_translations.txt || true

          # ── OmniStudio ────────────────────────────────────────────────────
          grep "$BASE/omniIntegrationProcedures/" changed_files.txt | sed 's#.*/##' > changed_omni_integrations.txt || true
          grep "$BASE/omniUiCard/" changed_files.txt | sed 's#.*/##' > changed_omni_ui_cards.txt || true
          grep "$BASE/omniDataTransform/" changed_files.txt | sed 's#.*/##' > changed_omni_data_transforms.txt || true

          echo "=== Metadata delta summary ==="
          for f in changed_*.txt; do
            if [ -f "$f" ]; then
              COUNT=$(wc -l < "$f" 2>/dev/null | tr -d ' ')
              COUNT=${COUNT:-0}
              [ "$COUNT" -gt 0 ] && echo "  $f: $COUNT item(s)"
            fi
          done

      # ------------------------------------------
      # Identify Test Classes
      # ------------------------------------------
      - name: Identify Test Classes
        run: |
          grep -rl "@isTest" force-app/main/default/classes/ | sed 's#.*/##;s/\.cls$//' > all_test_classes.txt || true

      # ------------------------------------------
      # Determine Test Run Strategy
      # ------------------------------------------
      - name: Determine Test Run Strategy
        id: teststrategy
        run: |
          HIGH_RISK_FILES=(
            changed_profiles.txt
            changed_permission_sets.txt
            changed_perm_set_groups.txt
            changed_roles.txt
            changed_sharing_rules.txt
            changed_validation_rules.txt
            changed_settings.txt
            changed_flows.txt
            changed_workflows.txt
            changed_approval_processes.txt
            changed_custom_permissions.txt
            changed_muting_perm_sets.txt
            changed_matching_rules.txt
            changed_duplicate_rules.txt
            changed_assignment_rules.txt
            changed_escalation_rules.txt
            changed_auto_response_rules.txt
            changed_objects.txt
            changed_fields.txt
            changed_global_value_sets.txt
            changed_std_value_sets.txt
          )

          RUN_ALL=false
          for f in "${HIGH_RISK_FILES[@]}"; do
            if [ -s "$f" ]; then
              echo "High-risk metadata changed ($f) → escalating to RunLocalTests"
              RUN_ALL=true
              break
            fi
          done

          echo "run_all=$RUN_ALL" >> $GITHUB_OUTPUT

      # ------------------------------------------
      # Map Tests
      # ------------------------------------------
      - name: Map Tests
        id: testmapping
        run: |
          > selected_tests.txt

          MAPPING_FILES=(
            changed_classes.txt
            changed_triggers.txt
            changed_lwc.txt
            changed_aura.txt
            changed_vf_pages.txt
            changed_vf_components.txt
            changed_flexipages.txt
            changed_flows.txt
            changed_custom_metadata.txt
            changed_labels.txt
            changed_quick_actions.txt
            changed_named_credentials.txt
            changed_platform_events.txt
            changed_notification_types.txt
            changed_notif_types.txt
            changed_omni_integrations.txt
            changed_omni_ui_cards.txt
            changed_omni_data_transforms.txt
          )

          while read testclass; do
            FILE="force-app/main/default/classes/${testclass}.cls"
            [ -f "$FILE" ] || continue
            for mfile in "${MAPPING_FILES[@]}"; do
              [ -s "$mfile" ] || continue
              while read token; do
                [ -z "$token" ] && continue
                grep -qw "$token" "$FILE" && echo "$testclass" >> selected_tests.txt
              done < "$mfile"
            done
          done < all_test_classes.txt

          sort -u selected_tests.txt > final_tests.txt
          TESTS=$(paste -sd ',' final_tests.txt)

          if [ "${{ steps.teststrategy.outputs.run_all }}" == "true" ]; then
            echo "test-level=RunLocalTests" >> $GITHUB_OUTPUT
            echo "tests=" >> $GITHUB_OUTPUT
            echo "Reason: High-risk metadata changed"
          elif [ -n "$TESTS" ]; then
            echo "test-level=RunSpecifiedTests" >> $GITHUB_OUTPUT
            echo "tests=$TESTS" >> $GITHUB_OUTPUT
            echo "Reason: Mapped tests found → $TESTS"
          else
            echo "test-level=RunLocalTests" >> $GITHUB_OUTPUT
            echo "tests=" >> $GITHUB_OUTPUT
            echo "Reason: No mapped tests found, falling back to RunLocalTests"
          fi

      # ------------------------------------------
      # Build Delta Source
      # ------------------------------------------
      - name: Build Delta Source
        run: |
          mkdir -p delta_src
          while read file; do
            [ -f "$file" ] || continue
            mkdir -p "delta_src/$(dirname $file)"
            cp "$file" "delta_src/$file"
          done < changed_files.txt

      # ------------------------------------------
      # Convert to MDAPI
      # ------------------------------------------
      - name: Convert to MDAPI
        run: |
          sf project convert source \
            --source-dir delta_src \
            --output-dir delta_mdapi

      # ------------------------------------------
      # Check Delta Empty
      # ------------------------------------------
      - name: Check Delta Empty
        id: checkdelta
        run: |
          if [ ! -f delta_mdapi/package.xml ]; then
            echo "no_changes=true" >> $GITHUB_OUTPUT
          else
            echo "no_changes=false" >> $GITHUB_OUTPUT
          fi

      # ------------------------------------------
      # Create Delta Branch
      # ------------------------------------------
      - name: Create Delta Branch
        if: ${{ steps.checkdelta.outputs.no_changes == 'false' }}
        run: |
          BRANCH=delta-release-${{ github.run_number }}
          git checkout -b $BRANCH
          cp -r delta_src/* . || true
          git config user.name "ci-bot"
          git config user.email "ci-bot@github.com"
          git add .
          git commit -m "Delta commit from develop (${{ github.sha }})"
          git push origin --delete $BRANCH 2>/dev/null || true
          git push origin $BRANCH
          echo "branch_name=$BRANCH" >> $GITHUB_ENV

      # ------------------------------------------
      # Validate Release Branch
      # ------------------------------------------
      - name: Validate Release Branch
        if: ${{ steps.checkdelta.outputs.no_changes == 'false' }}
        run: |
          git fetch origin
          if ! git rev-parse origin/release >/dev/null 2>&1; then
            git checkout -b release origin/develop
            git push origin release
          fi

      # ------------------------------------------
      # PR to Release
      # ------------------------------------------
      - name: Create PR to Release
        if: ${{ steps.checkdelta.outputs.no_changes == 'false' }}
        run: |
          gh pr create \
            --base release \
            --head ${{ env.branch_name }} \
            --title "Auto Delta PR from Develop" \
            --body "Includes only modified components"
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}

      # ------------------------------------------
      # Authenticate UAT
      # ------------------------------------------
      - name: Authenticate UAT
        run: |
          echo "${{ secrets.JWT_SECRET_KEY }}" > server.key
          sf org login jwt \
            --username ${{ secrets.DEPLOYMENT_USERNAME }} \
            --jwt-key-file server.key \
            --client-id ${{ secrets.CONSUMER_KEYS }} \
            --instance-url ${{ vars.INSTANCE_URL }} \
            --alias uat-org

      # ------------------------------------------
      # Validate Deployment to UAT
      # ------------------------------------------
      - name: Validate Deployment to UAT
        if: ${{ steps.checkdelta.outputs.no_changes == 'false' }}
        run: |
          TEST_LEVEL="${{ steps.testmapping.outputs.test-level }}"
          TESTS="${{ steps.testmapping.outputs.tests }}"

          if [ "$TEST_LEVEL" == "RunSpecifiedTests" ] && [ -n "$TESTS" ]; then
            sf project deploy validate \
              --metadata-dir delta_mdapi \
              --target-org uat-org \
              --test-level RunSpecifiedTests \
              --tests "$TESTS" \
              --wait 30
          else
            sf project deploy validate \
              --metadata-dir delta_mdapi \
              --target-org uat-org \
              --test-level RunLocalTests \
              --wait 30
          fi

      # ------------------------------------------
      # Push Release
      # ------------------------------------------
      - name: Push changes to Release
        if: success()
        run: |
          git checkout release
          git pull origin release || true
          git push origin release

      # ------------------------------------------
      # PR to Master
      # ------------------------------------------
      - name: Create PR to Master
        if: success()
        run: |
          gh pr create \
            --base master \
            --head release \
            --title "Release → Master Promotion" \
            --body "Validated changes ready for production"
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
