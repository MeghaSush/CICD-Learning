name: Salesforce CI/CD Pipeline (Enhanced Intelligent Coverage + Promotion)

on:
  push:
    branches:
      - develop

permissions:
  contents: write
  pull-requests: write
  actions: read

jobs:
  build-and-promote:
    runs-on: ubuntu-latest

    steps:
      # ------------------------------------------
      # Checkout FULL Repo
      # ------------------------------------------
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ------------------------------------------
      # Install Tools
      # ------------------------------------------
      - name: Install Tools
        run: |
          npm install -g @salesforce/cli
          sudo apt-get update
          sudo apt-get install -y gh

      # ------------------------------------------
      # Detect Changed Files
      # ------------------------------------------
      - name: Detect Changed Files
        id: diffcheck
        run: |
          echo "Before: ${{ github.event.before }}"
          echo "After : ${{ github.sha }}"

          git diff --name-only ${{ github.event.before }} ${{ github.sha }} > changed_files.txt
          git diff --name-status ${{ github.event.before }} ${{ github.sha }} > changes_with_status.txt

          cat changed_files.txt

      # ------------------------------------------
      # Extract Changed Metadata
      # ------------------------------------------
      - name: Extract Changed Metadata
        run: |
          grep -i "force-app/.*/classes/.*\.cls" changed_files.txt | sed 's#.*/##;s/.cls//' > changed_classes.txt || true
          grep -i "force-app/.*/triggers/.*\.trigger" changed_files.txt | sed 's#.*/##;s/.trigger//' > changed_triggers.txt || true
          grep -i "force-app/.*/lwc/" changed_files.txt | awk -F'/' '{print $(NF-1)}' | sort -u > changed_lwc.txt || true
          grep -i "force-app/.*/aura/" changed_files.txt | awk -F'/' '{print $(NF-1)}' | sort -u > changed_aura.txt || true
          grep -i "force-app/.*/pages/.*\.page" changed_files.txt | sed 's#.*/##;s/.page//' > changed_vf_pages.txt || true
          grep -i "force-app/.*/components/.*\.component" changed_files.txt | sed 's#.*/##;s/.component//' > changed_vf_components.txt || true
          grep -i "validationRules" changed_files.txt > changed_validation_rules.txt || true

      # ------------------------------------------
      # Identify Test Classes
      # ------------------------------------------
      - name: Identify Test Classes
        run: |
          grep -l "@isTest" force-app/main/default/classes/*.cls | sed 's#.*/##;s/.cls//' > all_test_classes.txt || true

      # ------------------------------------------
      # Map Tests
      # ------------------------------------------
      - name: Map Tests
        id: testmapping
        run: |
          > selected_tests.txt

          while read testclass; do
            FILE="force-app/main/default/classes/${testclass}.cls"
            [ -f "$FILE" ] || continue

            while read c; do grep -qw "$c" "$FILE" && echo "$testclass" >> selected_tests.txt; done < changed_classes.txt
            while read t; do grep -qw "$t" "$FILE" && echo "$testclass" >> selected_tests.txt; done < changed_triggers.txt
            while read l; do grep -qw "$l" "$FILE" && echo "$testclass" >> selected_tests.txt; done < changed_lwc.txt
            while read a; do grep -qw "$a" "$FILE" && echo "$testclass" >> selected_tests.txt; done < changed_aura.txt
            while read v; do grep -qw "$v" "$FILE" && echo "$testclass" >> selected_tests.txt; done < changed_vf_pages.txt
            while read vc; do grep -qw "$vc" "$FILE" && echo "$testclass" >> selected_tests.txt; done < changed_vf_components.txt

          done < all_test_classes.txt

          sort -u selected_tests.txt > final_tests.txt

          TESTS=$(paste -sd ',' final_tests.txt)

          if [ -n "$TESTS" ]; then
            echo "tests=$TESTS" >> $GITHUB_OUTPUT
            echo "test-level=RunSpecifiedTests" >> $GITHUB_OUTPUT
          else
            echo "test-level=RunLocalTests" >> $GITHUB_OUTPUT
          fi

      # ------------------------------------------
      # Validation Rule Override
      # ------------------------------------------
      - name: Check Validation Rule Changes
        id: vrulecheck
        run: |
          if [ -s changed_validation_rules.txt ]; then
            echo "run_all=true" >> $GITHUB_OUTPUT
          else
            echo "run_all=false" >> $GITHUB_OUTPUT
          fi

      # ------------------------------------------
      # Build Delta
      # ------------------------------------------
      - name: Build Delta Source
        run: |
          mkdir -p delta_src
          while read file; do
            [ -f "$file" ] && mkdir -p delta_src/$(dirname $file) && cp "$file" delta_src/$file
          done < changed_files.txt

      # ------------------------------------------
      # Convert to MDAPI
      # ------------------------------------------
      - name: Convert to MDAPI
        run: |
          sf project convert source --source-dir delta_src --output-dir delta_mdapi

      # ------------------------------------------
      # Check Delta
      # ------------------------------------------
      - name: Check Delta Empty
        id: checkdelta
        run: |
          if [ ! -f delta_mdapi/package.xml ]; then
            echo "no_changes=true" >> $GITHUB_OUTPUT
          else
            echo "no_changes=false" >> $GITHUB_OUTPUT
          fi

      # ------------------------------------------
      # Create Delta Branch
      # ------------------------------------------
      - name: Create Delta Branch
        if: ${{ steps.checkdelta.outputs.no_changes == 'false' }}
        run: |
          BRANCH=delta-release-${{ github.run_number }}
          git checkout -b $BRANCH
          cp -r delta_src/* . || true

          git config user.name "ci-bot"
          git config user.email "ci-bot@github.com"

          git add .
          git commit -m "Delta commit from develop (${{ github.sha }})"

          git push origin --delete $BRANCH 2>/dev/null || true
          git push origin $BRANCH

          echo "branch_name=$BRANCH" >> $GITHUB_ENV

      # ------------------------------------------
      # Validate Release Branch
      # ------------------------------------------
      - name: Validate Release Branch
        if: ${{ steps.checkdelta.outputs.no_changes == 'false' }}
        run: |
          git fetch origin
          if ! git rev-parse origin/release >/dev/null 2>&1; then
            git checkout -b release origin/develop
            git push origin release
          fi

      # ------------------------------------------
      # PR to Release
      # ------------------------------------------
      - name: Create PR to Release
        if: ${{ steps.checkdelta.outputs.no_changes == 'false' }}
        run: |
          gh pr create \
            --base release \
            --head ${{ env.branch_name }} \
            --title "Auto Delta PR from Develop" \
            --body "Includes only modified components"
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}

      # ------------------------------------------
      # Authenticate UAT
      # ------------------------------------------
      - name: Authenticate UAT
        run: |
          echo "${{ secrets.JWT_SECRET_KEY }}" > server.key
          sf org login jwt \
            --username ${{ secrets.DEPLOYMENT_USERNAME }} \
            --jwt-key-file server.key \
            --client-id ${{ secrets.CONSUMER_KEYS}} \
            --instance-url ${{ vars.INSTANCE_URL }} \
            --alias uat-org

      # ------------------------------------------
      # Validate Deployment
      # ------------------------------------------
      - name: Validate Deployment to UAT
        if: ${{ steps.checkdelta.outputs.no_changes == 'false' }}
        run: |
          sf project deploy validate \
            --metadata-dir delta_mdapi \
            --target-org uat-org \
            --test-level RunLocalTests \
            --wait 30

      # ------------------------------------------
      # Push Release
      # ------------------------------------------
      - name: Push changes to Release
        if: success()
        run: |
          git checkout release
          git pull origin release || true
          git push origin release

      # ------------------------------------------
      # PR to Master
      # ------------------------------------------
      - name: Create PR to Master
        if: success()
        run: |
          gh pr create \
            --base master \
            --head release \
            --title "Release → Master Promotion" \
            --body "Validated changes ready for production"
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
